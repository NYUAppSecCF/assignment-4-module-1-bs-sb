name: assignment 4 module 1
#this defines trigger even for this it push changes
on:
  push:
jobs:
  build:
    #running on standard github runner as NYU self-hosted runner (runs define the environment) is havig issue
    runs-on: ubuntu-latest

    steps:
    #steps has list of action that job will do, name is for label and run is for the action 
    - uses: actions/checkout@v4
  
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Android SDK setup
      uses: android-actions/setup-android@v2
    
    - name: Execution Grant permission for gradlew
      run: chmod +x gradlew
      working-directory: ./GiftcardSite
    - name: Build with gradle 
      run: ./gradlew build
      working-directory: ./GiftcardSite
     
  