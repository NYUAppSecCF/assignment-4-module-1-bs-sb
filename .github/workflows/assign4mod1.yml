name: assignment 4 module 1
#this defines trigger even for this it push changes
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    #NYU self-hosted runner (runs define the environment)
    runs-on: self-hosted

    steps:
    #steps has list of action that job will do, name is for label and run is for the action 
    - uses: actions/checkout@v4
  
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle
    - name: Android SDK setup
      uses: android-actions/setup-adroid@v2
    
    - name: Execution Grant permission for gradlew
      run: chmod +x gradlew
    - name: Build with gradle 
      run: ./gradlew build
  